<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Kasaneru — プロフィール</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #F6F2EC;
      --card:       #FFFFFF;
      --green:      #5A8A58;
      --green-dark: #3D6B3B;
      --green-mid:  #88B786;
      --green-light:#EAF2E9;
      --earth:      #C49A6C;
      --earth-light:#F5ECDF;
      --text:       #3B2F28;
      --text-mid:   #6E5E55;
      --text-soft:  #A89F98;
      --border:     #E5DDD4;
      --nav-h:      62px;
      --good:       #4BAA4B;
      --normal:     #CB9C14;
      --concern:    #D24545;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'M PLUS Rounded 1c', 'Hiragino Maru Gothic ProN', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding-bottom: calc(var(--nav-h) + 16px);
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 18px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 10px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo { display: flex; align-items: center; gap: 10px; }

    .logo-leaf {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--green), #88B786);
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 19px;
      box-shadow: 0 2px 8px rgba(90,138,88,0.3);
    }

    .logo-text h1 { font-size: 18px; font-weight: 800; color: var(--green-dark); }
    .logo-text p  { font-size: 10px; color: var(--text-soft); margin-top: 1px; }

    /* ── CONTENT ── */
    .content {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 14px 0;
    }

    /* ── PROFILE HERO ── */
    .profile-hero {
      background: var(--card);
      border-radius: 20px;
      padding: 28px 20px 22px;
      text-align: center;
      box-shadow: 0 3px 16px rgba(0,0,0,0.08);
      margin-bottom: 14px;
    }

    .profile-avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; font-weight: 800; color: #fff;
      margin: 0 auto 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    }

    .profile-name {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
    }

    .profile-role {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 14px;
      margin-bottom: 18px;
    }

    .role-family   { background: var(--green-light); color: var(--green-dark); }
    .role-caregiver { background: #EDE9F8; color: #5B3FA6; }

    /* ── STATS ROW ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .stat-cell {
      background: var(--card);
      padding: 14px 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 800;
      color: var(--green-dark);
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-soft);
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-soft);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin: 20px 0 10px;
    }

    /* ── RECORD LIST ── */
    .record-list { display: flex; flex-direction: column; gap: 10px; }

    .record-card {
      background: var(--card);
      border-radius: 14px;
      padding: 13px 14px;
      box-shadow: 0 1px 7px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .record-date-block {
      text-align: center;
      background: var(--green-light);
      border-radius: 10px;
      padding: 8px 10px;
      flex-shrink: 0;
      min-width: 44px;
    }

    .record-month { font-size: 9px; font-weight: 700; color: var(--green-dark); }
    .record-day   { font-size: 20px; font-weight: 800; color: var(--green-dark); line-height: 1; }

    .record-body { flex: 1; min-width: 0; }

    .record-status-row {
      display: flex;
      gap: 3px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-good    { background: var(--good); }
    .dot-normal  { background: var(--normal); }
    .dot-concern { background: var(--concern); }
    .dot-none    { background: var(--border); }

    .record-comment {
      font-size: 12px;
      color: var(--text-mid);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .record-tail {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }

    .record-react { font-size: 11px; color: var(--text-soft); }
    .record-time  { font-size: 10px; color: var(--text-soft); }

    /* ── LOGOUT BUTTON ── */
    .logout-btn {
      width: 100%;
      padding: 14px;
      background: #FEF2F2;
      border: 2px solid #FECACA;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 700;
      color: var(--concern);
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.18s;
      -webkit-tap-highlight-color: transparent;
      margin-top: 20px;
    }

    .logout-btn:active { background: #FEE2E2; }

    /* ── EMPTY ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-soft);
    }

    .empty-icon  { font-size: 40px; margin-bottom: 10px; }
    .empty-title { font-size: 14px; font-weight: 700; color: var(--text-mid); }

    /* ── LOADING ── */
    .loading { text-align: center; padding: 40px; font-size: 14px; color: var(--text-soft); }

    /* ── BOTTOM NAV (4タブ) ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-around;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 90;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
    }

    .nav-item {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      text-decoration: none;
      padding: 8px 0;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-icon  { font-size: 20px; line-height: 1; }
    .nav-label { font-size: 9px; font-weight: 700; color: var(--text-soft); }
    .nav-item.active .nav-label { color: var(--green); }

    .nav-post {
      width: 46px; height: 46px;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      box-shadow: 0 4px 14px rgba(58,107,57,0.45);
      text-decoration: none;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="header">
  <div class="logo">
    <div class="logo-leaf">🍃</div>
    <div class="logo-text">
      <h1>プロフィール</h1>
      <p>Kasaneru</p>
    </div>
  </div>
</header>

<!-- ── MAIN ── -->
<main class="content">
  <div id="profileArea"><div class="loading">🌱 読み込み中...</div></div>
  <div id="recordArea"></div>
  <div style="height:4px;"></div>
</main>

<!-- ── BOTTOM NAV ── -->
<nav class="bottom-nav">
  <a href="/kasaneru-feed.html" class="nav-item">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">フィード</span>
  </a>
  <a href="/kasaneru-post.html" class="nav-post" aria-label="記録">➕</a>
  <a href="/kasaneru-summary.html" class="nav-item">
    <span class="nav-icon">📊</span>
    <span class="nav-label">サマリー</span>
  </a>
  <a href="/kasaneru-profile.html" class="nav-item active">
    <span class="nav-icon">👤</span>
    <span class="nav-label">プロフィール</span>
  </a>
</nav>

<script>
'use strict';

const CATS = [
  { key: 'meal' }, { key: 'bath' }, { key: 'change' }, { key: 'toilet' },
  { key: 'move' }, { key: 'groom' }, { key: 'mood' }, { key: 'medicine' },
];

const AVATAR_COLORS = ['#5A8A58','#5B7FA6','#C47E5A','#8A5AB4','#A65B5B','#5A8A8A'];
const ROLE_LABELS   = { family: '家族', caregiver: 'ケアマネ' };

function colorFor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffffffff;
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}

function dotClass(s) {
  return s === 'good' ? 'dot-good' : s === 'normal' ? 'dot-normal' : s === 'concern' ? 'dot-concern' : 'dot-none';
}

function calcStreak(records) {
  if (!records.length) return 0;
  const dates = [...new Set(records.map(r => r.record_date))].sort().reverse();
  const today = new Date().toLocaleDateString('ja-JP', { timeZone: 'Asia/Tokyo' });
  if (dates[0] !== today) return 0;
  let streak = 1;
  for (let i = 1; i < dates.length; i++) {
    const prev = parseJaDate(dates[i - 1]);
    const cur  = parseJaDate(dates[i]);
    if (!prev || !cur) break;
    const diff = (prev - cur) / 86400000;
    if (diff === 1) streak++;
    else break;
  }
  return streak;
}

function parseJaDate(str) {
  const m = str?.match(/(\d{4})\/(\d{1,2})\/(\d{1,2})/);
  return m ? new Date(+m[1], +m[2]-1, +m[3]) : null;
}

function relTime(str) {
  if (!str) return '';
  const d = new Date(str.replace(/\//g,'-').replace(/(\d{4})-(\d{1,2})-(\d{1,2})\s/, '$1-$2-$3T'));
  if (isNaN(d)) return str;
  const diff = (Date.now() - d) / 1000;
  if (diff < 60)    return 'たった今';
  if (diff < 3600)  return `${Math.floor(diff/60)}分前`;
  if (diff < 86400) return `${Math.floor(diff/3600)}時間前`;
  return `${Math.floor(diff/86400)}日前`;
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function load() {
  try {
    const [meData, records] = await Promise.all([
      fetch('/api/me').then(r => { if(r.status===401){location.href='/kasaneru-login.html';throw 0;} return r.json(); }),
      fetch('/api/kasaneru/my-records').then(r => r.json()),
    ]);

    const user = meData.user;
    if (!user) { location.href = '/kasaneru-login.html'; return; }

    renderProfile(user, records);
    renderRecords(records);
  } catch (e) {
    if (e !== 0) {
      document.getElementById('profileArea').innerHTML =
        '<div class="loading">読み込みに失敗しました</div>';
    }
  }
}

function renderProfile(user, records) {
  const uniqueDays = new Set(records.map(r => r.record_date)).size;
  const streak     = calcStreak(records);
  const color      = colorFor(user.name);
  const roleLabel  = ROLE_LABELS[user.role] || user.role;
  const roleCls    = user.role === 'caregiver' ? 'role-caregiver' : 'role-family';

  document.getElementById('profileArea').innerHTML = `
    <div class="profile-hero">
      <div class="profile-avatar" style="background:${color}">${user.name[0]}</div>
      <div class="profile-name">${escHtml(user.name)}</div>
      <span class="profile-role ${roleCls}">${roleLabel}</span>
      <div class="stats-row">
        <div class="stat-cell">
          <div class="stat-value">${records.length}</div>
          <div class="stat-label">総記録数</div>
        </div>
        <div class="stat-cell">
          <div class="stat-value">${uniqueDays}</div>
          <div class="stat-label">記録した日数</div>
        </div>
        <div class="stat-cell">
          <div class="stat-value">${streak > 0 ? streak + '🔥' : '—'}</div>
          <div class="stat-label">連続記録</div>
        </div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">
      <span>🚪</span><span>ログアウト</span>
    </button>
  `;
}

function renderRecords(records) {
  if (records.length === 0) {
    document.getElementById('recordArea').innerHTML = `
      <p class="section-label">記録履歴</p>
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-title">まだ記録がありません</div>
      </div>
    `;
    return;
  }

  const cards = records.map(r => {
    const sel    = typeof r.selections === 'string' ? JSON.parse(r.selections) : (r.selections || {});
    const date   = parseJaDate(r.record_date);
    const month  = date ? `${date.getMonth()+1}月` : '—';
    const day    = date ? date.getDate() : '—';
    const dots   = CATS.map(c => `<div class="status-dot ${dotClass(sel[c.key])}"></div>`).join('');
    const comment = r.comment ? `<div class="record-comment">${escHtml(r.comment)}</div>` : '';

    return `
      <div class="record-card">
        <div class="record-date-block">
          <div class="record-month">${month}</div>
          <div class="record-day">${day}</div>
        </div>
        <div class="record-body">
          <div class="record-status-row">${dots}</div>
          ${comment}
        </div>
        <div class="record-tail">
          <div class="record-react">❤️ ${r.reaction_count || 0}</div>
          <div class="record-time">${relTime(r.created_at)}</div>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('recordArea').innerHTML = `
    <p class="section-label">記録履歴</p>
    <div class="record-list">${cards}</div>
  `;
}

async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  location.href = '/kasaneru-login.html';
}

load();
</script>
</body>
</html>
