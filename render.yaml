services:
  - type: web
    name: kasaneru-app
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: kasaneru-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false

databases:
  - name: kasaneru-db
    plan: free
